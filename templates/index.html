<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHSB Cert Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">
    
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
  </head>
  <body class="bg-slate-900 text-slate-200 min-h-screen font-sans">
    <nav class="flex items-center justify-between px-8 py-4 bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center shadow-lg shadow-orange-900/20">
          <img src="/static/chsb_logo.png" alt="Logo" class="w-7 h-7 object-contain" onerror="this.parentElement.innerHTML=`<i class='fas fa-fire text-white text-xl'></i>`" />
        </div>
        <h1 class="text-2xl font-bold tracking-tight">CHSB Cert <span class="text-orange-500">Extractor</span></h1>
        <span class="bg-blue-600/20 text-blue-400 text-[10px] uppercase font-bold px-2 py-0.5 rounded border border-blue-500/30 ml-2">Admin</span>
      </div>
      <div class="flex items-center gap-8">
        <div class="flex gap-6 border-b-2 border-transparent">
          <button onclick="showTab('dashboard')" id="nav-dashboard" class="nav-link active py-2 text-blue-400 border-b-2 border-blue-500 transition-all">Dashboard</button>
          <button onclick="showTab('upload')" id="nav-upload" class="nav-link py-2 text-slate-400 hover:text-slate-100 transition-all">Add / Upload</button>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition shadow-inner">
          <i class="fas fa-cog text-yellow-500"></i>
        </button>
      </div>
    </nav>

    <div class="flex">
      <aside class="w-64 border-r border-slate-800 min-h-[calc(100vh-73px)] p-6 shrink-0 bg-slate-900/50">
        <h3 class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-6 px-2">Folders</h3>
        <nav class="space-y-1" id="folderList">
          </nav>
      </aside>

      <main class="flex-1 p-8">
        <div id="tab-dashboard" class="tab-content animate-in">
          <div class="flex justify-between items-end mb-8">
            <div>
              <h2 id="collectionTitle" class="text-3xl font-bold text-white mb-1">GD</h2>
              <div class="h-1.5 w-12 bg-orange-600 rounded-full"></div>
            </div>
            <span id="itemCount" class="bg-slate-800 px-4 py-1.5 rounded-full text-xs font-semibold text-slate-400 border border-slate-700">0 items</span>
          </div>

          <div class="bg-slate-800/40 rounded-2xl border border-slate-700/50 overflow-hidden backdrop-blur-sm shadow-xl">
            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead>
                  <tr class="text-[10px] uppercase font-bold text-slate-500 border-b border-slate-700/50">
                    <th class="py-4 px-6">Serial No</th>
                    <th class="py-4 px-6">Model</th>
                    <th class="py-4 px-6">Expiry</th>
                    <th class="py-4 px-6 text-center">Actions</th>
                  </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800/50"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
