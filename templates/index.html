<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHSB Cert Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body class="bg-gray-50 h-screen flex flex-col">
    <header class="bg-white shadow-sm z-20">
      <div
        class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <img
            src="/static/chsb_logo.png"
            alt="CHSB Logo"
            class="h-10 w-auto"
          />
          <h1 class="text-xl font-bold text-gray-800 tracking-tight">
            CHSB Cert Extractor
            <span
              class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded ml-2"
              >Admin</span
            >
          </h1>
        </div>
        <div class="flex gap-4">
          <button
            onclick="switchTab('dashboard')"
            id="btn-dashboard"
            class="px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 transition"
          >
            Dashboard
          </button>
          <button
            onclick="switchTab('upload')"
            id="btn-upload"
            class="px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition"
          >
            Upload New
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-6 overflow-hidden">
      <div id="tab-dashboard" class="h-full flex gap-6">
        <div
          class="w-64 bg-white rounded-xl shadow-sm p-4 h-full flex flex-col"
        >
          <div class="mb-4">
            <input
              type="text"
              id="searchBox"
              placeholder="Search Serial No..."
              class="w-full border p-2 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"
              onkeyup="if(event.key === 'Enter') performSearch()"
            />
          </div>
          <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">
            Collections
          </h3>
          <div
            id="collectionList"
            class="flex-1 overflow-y-auto space-y-1"
          ></div>
        </div>

        <div
          class="flex-1 bg-white rounded-xl shadow-sm flex flex-col overflow-hidden"
        >
          <div
            class="p-4 border-b flex justify-between items-center bg-gray-50"
          >
            <h2 id="tableTitle" class="font-bold text-gray-700">
              Select a Collection
            </h2>
            <span
              id="countBadge"
              class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full"
              >0 items</span
            >
          </div>
          <div class="flex-1 overflow-auto">
            <table class="w-full text-left">
              <thead
                class="bg-gray-50 text-gray-500 text-xs uppercase sticky top-0"
              >
                <tr>
                  <th class="px-6 py-3">Serial No</th>
                  <th class="px-6 py-3">Model</th>
                  <th class="px-6 py-3">Expiry</th>
                  <th class="px-6 py-3 text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="tableBody" class="divide-y divide-gray-100 text-sm">
                <tr>
                  <td colspan="4" class="p-10 text-center text-gray-400">
                    Select a folder or search to view data
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div
        id="tab-upload"
        class="hidden h-full flex justify-center items-start pt-10"
      >
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl">
          <div id="step1" class="text-center">
            <div class="flex justify-center mb-6">
              <div class="bg-gray-100 p-1 rounded-lg flex">
                <button
                  onclick="setUploadType(false)"
                  id="type-rental"
                  class="px-6 py-2 rounded-md text-sm font-bold bg-white text-gray-800 shadow-sm transition"
                >
                  📋 Rental
                </button>
                <button
                  onclick="setUploadType(true)"
                  id="type-service"
                  class="px-6 py-2 rounded-md text-sm font-bold text-gray-500 hover:text-gray-800 transition"
                >
                  🔧 Service
                </button>
              </div>
            </div>

            <div
              class="border-2 border-dashed border-gray-300 rounded-xl p-12 hover:bg-gray-50 cursor-pointer transition"
              onclick="document.getElementById('fileInput').click()"
            >
              <i
                class="fas fa-cloud-upload-alt text-5xl text-blue-500 mb-4"
              ></i>
              <h3 class="text-lg font-semibold text-gray-700">
                Drop PDF here or Click to Upload
              </h3>
              <p class="text-sm text-gray-400 mt-2">
                AI will auto-detect equipment type
              </p>
              <input
                type="file"
                id="fileInput"
                class="hidden"
                accept="application/pdf"
                onchange="handleFileSelect()"
              />
            </div>
          </div>

          <div id="step2" class="hidden">
            <h3 class="text-lg font-bold mb-4 text-gray-800">
              Verify Extraction
            </h3>

            <div class="mb-4">
              <span
                id="aiBadge"
                class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded font-bold uppercase"
                >AI DETECTED</span
              >
              <span
                id="folderBadge"
                class="ml-2 bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold"
              ></span>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
              <div>
                <label class="text-xs text-gray-500 font-bold"
                  >Serial Number</label
                ><input
                  id="upSerial"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
              <div>
                <label class="text-xs text-gray-500 font-bold">Model</label
                ><input
                  id="upModel"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
              <div>
                <label class="text-xs text-gray-500 font-bold">Cal Date</label
                ><input
                  id="upCal"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
              <div>
                <label class="text-xs text-gray-500 font-bold">Exp Date</label
                ><input
                  id="upExp"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
              <div>
                <label class="text-xs text-gray-500 font-bold">Cert No</label
                ><input
                  id="upCert"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
              <div>
                <label class="text-xs text-gray-500 font-bold"
                  >Lot / Report No</label
                ><input
                  id="upLot"
                  class="w-full border p-2 rounded bg-gray-50"
                />
              </div>
            </div>
            <input type="hidden" id="upCollection" />
            <div class="flex gap-3">
              <button
                onclick="saveUpload()"
                class="flex-1 bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 shadow-lg"
              >
                Save to Cloud
              </button>
              <button
                onclick="resetUpload()"
                class="px-4 py-2 text-gray-500 hover:text-gray-700"
              >
                Cancel
              </button>
            </div>
          </div>

          <div id="loading" class="hidden text-center py-10">
            <i class="fas fa-robot fa-spin text-4xl text-purple-600 mb-4"></i>
            <h3 class="text-lg font-bold text-gray-700">AI is Analyzing...</h3>
            <p class="text-sm text-gray-500">Extracting data from document</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      const API = "";
      let currentFile = null;
      let isServiceUpload = false; // Default to Rental

      function switchTab(tab) {
        document
          .getElementById("tab-dashboard")
          .classList.toggle("hidden", tab !== "dashboard");
        document
          .getElementById("tab-upload")
          .classList.toggle("hidden", tab !== "upload");
        document.getElementById("btn-dashboard").className =
          tab === "dashboard"
            ? "px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 transition"
            : "px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition";
        document.getElementById("btn-upload").className =
          tab === "upload"
            ? "px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 transition"
            : "px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition";
      }

      // Toggle Rental/Service Logic
      function setUploadType(isService) {
        isServiceUpload = isService;
        const rentalBtn = document.getElementById("type-rental");
        const serviceBtn = document.getElementById("type-service");

        if (isService) {
          rentalBtn.className =
            "px-6 py-2 rounded-md text-sm font-bold text-gray-500 hover:text-gray-800 transition";
          serviceBtn.className =
            "px-6 py-2 rounded-md text-sm font-bold bg-purple-600 text-white shadow-sm transition";
        } else {
          rentalBtn.className =
            "px-6 py-2 rounded-md text-sm font-bold bg-white text-gray-800 shadow-sm transition";
          serviceBtn.className =
            "px-6 py-2 rounded-md text-sm font-bold text-gray-500 hover:text-gray-800 transition";
        }
      }

      async function init() {
        const res = await axios.get(`${API}/api/collections`);
        const nav = document.getElementById("collectionList");
        nav.innerHTML = res.data.collections
          .map(
            (c) =>
              `<button onclick="loadCollection('${c}')" class="w-full text-left px-3 py-2 rounded text-gray-600 hover:bg-blue-50 hover:text-blue-600 text-sm transition flex items-center">
                    <i class="fas ${
                      c.includes("SERVICE")
                        ? "fa-tools text-purple-400"
                        : "fa-folder text-yellow-400"
                    } mr-2"></i> 
                    ${c.replace("_SERVICE", " (Svc)")}
                </button>`
          )
          .join("");
      }

      async function loadCollection(col) {
        document.getElementById("tableTitle").innerText = col.replace(
          "_SERVICE",
          " (Service)"
        );
        document.getElementById(
          "tableBody"
        ).innerHTML = `<tr><td colspan="4" class="p-10 text-center"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>`;
        try {
          const res = await axios.get(`${API}/api/collection/${col}`);
          renderTable(res.data.data, col);
        } catch (e) {
          console.error(e);
        }
      }

      async function performSearch() {
        const q = document.getElementById("searchBox").value;
        if (!q) return;
        document.getElementById("tableTitle").innerText = `Search: "${q}"`;
        try {
          const res = await axios.get(`${API}/api/search?q=${q}`);
          renderTable(res.data.results, null);
        } catch (e) {
          alert("Search failed");
        }
      }

      function renderTable(data, collectionName) {
        const tbody = document.getElementById("tableBody");
        document.getElementById(
          "countBadge"
        ).innerText = `${data.length} items`;

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400">No records found</td></tr>`;
          return;
        }

        tbody.innerHTML = data
          .map(
            (item) => `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                    <td class="px-6 py-3 font-medium text-gray-900">${
                      item.serial
                    }</td>
                    <td class="px-6 py-3 text-gray-600">${item.model}</td>
                    <td class="px-6 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">${
                      item.expiry_date
                    }</span></td>
                    <td class="px-6 py-3 text-right space-x-3">
                        ${
                          item.pdf_url
                            ? `<a href="${item.pdf_url}" target="_blank" class="text-blue-500 hover:text-blue-700" title="View PDF"><i class="fas fa-file-pdf"></i></a>`
                            : ""
                        }
                        ${
                          collectionName
                            ? `<button onclick="deleteItem('${collectionName}', '${item.id}')" class="text-red-400 hover:text-red-600" title="Delete"><i class="fas fa-trash"></i></button>`
                            : ""
                        }
                    </td>
                </tr>
            `
          )
          .join("");
      }

      async function deleteItem(col, id) {
        if (!confirm("Delete this record permanently?")) return;
        await axios.delete(`${API}/api/collection/${col}/${id}`);
        loadCollection(col);
      }

      // Upload
      async function handleFileSelect() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) return;
        currentFile = file;
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("loading").classList.remove("hidden");

        const fd = new FormData();
        fd.append("file", file);
        // ✅ Send the toggle value
        fd.append("is_service", isServiceUpload);

        try {
          const res = await axios.post(`${API}/extract`, fd);
          const d = res.data.data[0];
          document.getElementById("upSerial").value = d.serial || "";
          document.getElementById("upModel").value = d.model || "";
          document.getElementById("upCal").value = d.cal || "";
          document.getElementById("upExp").value = d.exp || "";
          document.getElementById("upCert").value = d.cert || "";
          document.getElementById("upLot").value = d.lot || "";
          document.getElementById("upCollection").value =
            res.data.collection || "UNKNOWN";

          // Update Badges
          document.getElementById("folderBadge").innerText =
            res.data.collection;

          document.getElementById("loading").classList.add("hidden");
          document.getElementById("step2").classList.remove("hidden");
        } catch (e) {
          alert("Extraction Error");
          resetUpload();
        }
      }

      async function saveUpload() {
        const fd = new FormData();
        fd.append("file", currentFile);
        fd.append("serial", document.getElementById("upSerial").value);
        fd.append("model", document.getElementById("upModel").value);
        fd.append("cal", document.getElementById("upCal").value);
        fd.append("exp", document.getElementById("upExp").value);
        fd.append("cert", document.getElementById("upCert").value);
        fd.append("lot", document.getElementById("upLot").value);
        fd.append("collection", document.getElementById("upCollection").value);

        try {
          await axios.post(`${API}/save`, fd);
          alert("Saved!");
          resetUpload();
          switchTab("dashboard");
          // Refresh list if applicable
          const col = document.getElementById("upCollection").value;
          if (col) loadCollection(col);
        } catch (e) {
          alert("Save Failed");
        }
      }

      function resetUpload() {
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("step1").classList.remove("hidden");
        document.getElementById("fileInput").value = "";
        currentFile = null;
      }

      init();
    </script>
  </body>
</html>
