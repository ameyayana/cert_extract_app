<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CHSB Cert Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <link
    rel="stylesheet"
    href="{{ request.url_for('static', path='css/style.css') }}"
  />
</head>

<body class="bg-gray-50 dark:bg-gray-900 h-screen flex flex-col transition-colors duration-200">

  <!-- HEADER -->
  <header class="bg-white dark:bg-gray-800 shadow-sm z-20 transition-colors duration-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

      <div class="flex items-center gap-3">
        <img
          src="{{ url_for('static', filename='chsb_logo.png') }}"
          alt="CHSB Logo"
          class="h-10 w-auto"
        />

        <h1 class="text-xl font-bold text-gray-800 dark:text-white tracking-tight">
          CHSB Cert Extractor

          <span
            class="text-xs bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200 px-2 py-1 rounded ml-2"
          >
            Admin
          </span>
        </h1>
      </div>

      <div class="flex gap-4 items-center">

        <button
          onclick="switchTab('dashboard')"
          id="btn-dashboard"
          class="px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 transition dark:text-blue-400 dark:border-blue-400"
        >
          Dashboard
        </button>

        <button
          onclick="switchTab('upload')"
          id="btn-upload"
          class="px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition dark:text-gray-400 dark:hover:text-blue-400"
        >
          Add / Upload
        </button>

        <button
          onclick="toggleTheme()"
          class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-600 transition ml-2"
        >
          <i id="themeIcon" class="fas fa-moon"></i>
        </button>

      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-7xl mx-auto w-full p-6 overflow-hidden">

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="h-full flex gap-6">

      <!-- SIDEBAR -->
      <div
        class="w-64 bg-white dark:bg-gray-800 rounded-xl shadow-sm p-4 h-full flex flex-col transition-colors duration-200"
      >
        <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">
          Folders
        </h3>

        <div
          id="collectionList"
          class="flex-1 overflow-y-auto space-y-1"
        ></div>
      </div>

      <!-- TABLE -->
      <div
        class="flex-1 bg-white dark:bg-gray-800 rounded-xl shadow-sm flex flex-col overflow-hidden transition-colors duration-200"
      >

        <!-- TOP BAR -->
        <div class="p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800">

          <div class="flex justify-between items-center mb-4">

            <h2
              id="tableTitle"
              class="text-lg font-bold text-gray-700 dark:text-gray-200"
            >
              Select a Collection
            </h2>

            <span
              id="countBadge"
              class="text-xs bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded-full"
            >
              0 items
            </span>
          </div>

          <!-- FILTERS -->
          <div class="flex gap-2">

            <div class="relative flex-1">

              <i
                class="fas fa-search absolute left-3 top-3 text-gray-400"
              ></i>

              <input
                type="text"
                id="searchBox"
                placeholder="Search..."
                class="w-full border dark:border-gray-600 pl-10 p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white dark:bg-gray-700 dark:text-white"
                oninput="applyFilters()"
              />
            </div>

            <select
              id="filterField"
              class="border dark:border-gray-600 p-2 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-white outline-none"
              onchange="applyFilters()"
            >
              <option value="all">All Fields</option>
              <option value="serial">Serial No</option>
              <option value="model">Model</option>
              <option value="cert">Cert No</option>
              <option value="lot">Lot No</option>
            </select>

            <select
              id="sortOrder"
              class="border dark:border-gray-600 p-2 rounded-lg text-sm bg-white dark:bg-gray-700 text-gray-700 dark:text-white outline-none"
              onchange="applyFilters()"
            >
              <option value="updated_desc">Recent Updates</option>
              <option value="updated_asc">Oldest Updates</option>
              <option value="exp_asc">Expiring Soon</option>
              <option value="exp_desc">Expiring Later</option>
            </select>

          </div>
        </div>

        <!-- TABLE -->
        <div class="flex-1 overflow-auto bg-white dark:bg-gray-800">

          <table class="w-full text-left">

            <thead
              class="bg-gray-50 dark:bg-gray-700 text-gray-500 dark:text-gray-300 text-xs uppercase sticky top-0 z-10"
            >
              <tr>
                <th class="px-6 py-3">Serial No</th>
                <th class="px-6 py-3">Model</th>
                <th class="px-6 py-3">Expiry</th>
                <th class="px-6 py-3">Updated</th>
                <th class="px-6 py-3 text-right">Actions</th>
              </tr>
            </thead>

            <tbody
              id="tableBody"
              class="divide-y divide-gray-100 dark:divide-gray-700 text-sm"
            >
              <tr>
                <td colspan="5" class="p-10 text-center text-gray-400">
                  Select a folder to view data
                </td>
              </tr>
            </tbody>

          </table>

        </div>
      </div>
    </div>

    <!-- UPLOAD -->
    <div
      id="tab-upload"
      class="hidden h-full flex justify-center items-start pt-5 overflow-y-auto"
    >

      <div
        class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-4xl flex gap-6 relative transition-colors duration-200"
      >

        <div class="flex-1">

          <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-4">
            New Entry
          </h3>

          <!-- DROPZONE -->
          <div
            id="dropZone"
            class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-6 text-center hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer transition mb-4"
            onclick="document.getElementById('fileInput').click()"
          >

            <i class="fas fa-file-pdf text-3xl text-gray-400 mb-2"></i>

            <p
              class="text-sm text-gray-600 dark:text-gray-300"
              id="fileNameDisplay"
            >
              Click or Drag & Drop PDF(s) here
            </p>

            <input
              type="file"
              id="fileInput"
              class="hidden"
              accept="application/pdf"
              multiple
              onchange="handleFileSelect()"
            />
          </div>

          <!-- FORM -->
          <div class="grid grid-cols-2 gap-3 mb-4">

            <div class="col-span-2">
              <label class="text-xs font-bold text-gray-500 dark:text-gray-400">
                Serial No
              </label>

              <input
                id="upSerial"
                class="w-full border dark:border-gray-600 p-2 rounded bg-white dark:bg-gray-700 dark:text-white"
                oninput="updatePreview()"
              />
            </div>

            <div class="col-span-2">
              <label class="text-xs font-bold text-gray-500 dark:text-gray-400">
                Model
              </label>

              <input
                id="upModel"
                class="w-full border dark:border-gray-600 p-2 rounded bg-white dark:bg-gray-700 dark:text-white"
              />
            </div>

          </div>

          <button
            onclick="saveManual()"
            class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 shadow transition"
          >
            Save Manual Entry
          </button>

        </div>

      </div>
    </div>

  </main>

  <!-- LOADING -->
  <div
    id="loading"
    class="fixed inset-0 bg-white dark:bg-gray-900 bg-opacity-90 hidden flex items-center justify-center z-50"
  >

    <div class="text-center">

      <i
        class="fas fa-circle-notch fa-spin text-5xl text-blue-600 mb-4"
      ></i>

      <h3 class="text-xl font-bold text-gray-800 dark:text-white">
        Processing...
      </h3>

      <p
        id="loadingText"
        class="text-gray-500 dark:text-gray-400 mt-2"
      >
        Please wait
      </p>

    </div>
  </div>

  <script src="{{ request.url_for('static', path='js/app.js') }}"></script>

</body>
</html>
